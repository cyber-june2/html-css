<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face {
            font-family: "SuperPejo";
            src: url(fonts/SuperMario256.ttf) format(truetype);
            font-weight: normal;
            font-style: normal;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        h1 {
            text-align: center;
            font-family: 'SuperPejo', Times, serif;
            font-size: 3em;
        }
        p {
            text-align: center;
            font-family: 'SuperPejo', Times, serif;
            font-size: 1em;
            font-weight: lighter;
        }
    </style>
</head>
<body>
    <h1>Super Pejo 222</h1>
    <p>O cara que melhora tudo nas minhas piores fases!</p>
</body>
</html>
